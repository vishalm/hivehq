# ──────────────────────────────────────────────────────────────────────────────
# HIVE — Full Stack Docker Compose
#
# Quick start:
#   docker compose --env-file .env.docker up --build -d
#
# Services:
#   - node-server : TTP ingestion & storage (port 3000)
#   - dashboard   : Next.js HIVE Dashboard  (port 3001)
#   - postgres    : TimescaleDB for events  (port 5432)
#   - redis       : Queue & caching         (port 6379)
#   - ollama      : Local LLM runtime       (port 11434)
# ──────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  networks:
    - hive

services:
  # ── TimescaleDB — event storage ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hive
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive_dev_password}
      # PGDATA in a subdirectory so .gitkeep in the mount root doesn't block initdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./.hive/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis — queue & caching ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *common
    ports:
      - "6379:6379"
    volumes:
      - ./.hive/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Node Server — TTP ingestion ──────────────────────────────────────────
  node-server:
    build:
      context: .
      dockerfile: Dockerfile.node
    <<: *common
    ports:
      - "3000:3000"
    environment:
      # ── App config (from .env.docker) ──
      NODE_PORT: "3000"
      NODE_REGION: ${NODE_REGION:-AE}
      NODE_ID: ${NODE_ID:-hive-node-01}
      NODE_INGEST_TOKEN: ${NODE_INGEST_TOKEN:-hive-dev-token-2026}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ── Docker-internal URLs (not in .env — these are fixed network names) ──
      NODE_DATABASE_URL: postgresql://hive:${POSTGRES_PASSWORD:-hive_dev_password}@postgres:5432/hive
      NODE_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Dashboard — Next.js HIVE UI ──────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    <<: *common
    ports:
      - "3001:3001"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
      # SSR fetches use Docker network name
      DASHBOARD_NODE_URL: http://node-server:3000
      # Client-side (browser) fetches use host-mapped port
      NEXT_PUBLIC_NODE_URL: http://localhost:3000
    depends_on:
      node-server:
        condition: service_healthy

  # ── Ollama — Local LLM (GPU) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    <<: *common
    ports:
      - "11434:11434"
    volumes:
      - ./.hive/data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama CPU-only (default) ────────────────────────────────────────────
  ollama-cpu:
    image: ollama/ollama:latest
    <<: *common
    ports:
      - "11434:11434"
    volumes:
      - ./.hive/data/ollama:/root/.ollama
    profiles:
      - cpu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

# Persistent data lives on disk at .hive/data/{postgres,redis,ollama}
# No Docker-managed volumes — survives `docker compose down` and is visible to git.

networks:
  hive:
    driver: bridge
