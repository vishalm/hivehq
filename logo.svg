<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HIVE logo">
  <defs>
    <linearGradient id="scoutGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6E6E73"/>
      <stop offset="100%" stop-color="#98989D"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0071E3"/>
      <stop offset="100%" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="hiveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A47C6"/>
      <stop offset="100%" stop-color="#6E6CF4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#5856D6" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- Scout hex — bottom-left — gray (the meter) -->
  <polygon
    points="77.5,87 100,100 100,126 77.5,139 55,126 55,100"
    fill="url(#scoutGrad)"
    opacity="0.92"
  />

  <!-- Node hex — bottom-right — blue (the hub) -->
  <polygon
    points="122.5,87 145,100 145,126 122.5,139 100,126 100,100"
    fill="url(#nodeGrad)"
    opacity="0.96"
  />

  <!-- Hive hex — top — indigo (the constellation) -->
  <polygon
    points="100,48 122.5,61 122.5,87 100,100 77.5,87 77.5,61"
    fill="url(#hiveGrad)"
    filter="url(#softglow)"
  />

  <!-- Cell dividers — white hairlines -->
  <line x1="100" y1="100" x2="100" y2="126" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="77.5" y2="87"  stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="100" y1="100" x2="122.5" y2="87" stroke="white" stroke-width="1.2" opacity="0.5"/>

  <!-- Outer border — subtle white stroke on each hex -->
  <polygon points="77.5,87 100,100 100,126 77.5,139 55,126 55,100"
    fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <polygon points="122.5,87 145,100 145,126 122.5,139 100,126 100,100"
    fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <polygon points="100,48 122.5,61 122.5,87 100,100 77.5,87 77.5,61"
    fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- Center node — the meeting point of Scout · Node · Hive -->
  <circle cx="100" cy="100" r="5.5" fill="white" opacity="0.97"/>

  <!-- Outer apex — the Hive beacon -->
  <circle cx="100" cy="48" r="3.5" fill="white" opacity="0.9"/>

  <!-- Scout outer corner -->
  <circle cx="55" cy="113" r="2.5" fill="white" opacity="0.55"/>
  <!-- Node outer corner -->
  <circle cx="145" cy="113" r="2.5" fill="white" opacity="0.55"/>
</svg>
