# ──────────────────────────────────────────────────────────────────────────────
# HIVE — Full Stack Docker Compose
#
# Quick start:
#   docker compose --env-file .env.docker up --build -d
#
# Profiles:
#   docker compose --profile cpu  --env-file .env.docker up --build -d  (CPU Ollama)
#   docker compose --profile gpu  --env-file .env.docker up --build -d  (GPU Ollama)
#   docker compose --profile docs --env-file .env.docker up --build -d  (Include docs)
#
# Services:
#   - node-server    : TTP ingestion & storage       (port 3000)
#   - dashboard      : Next.js HIVE Dashboard        (port 3001)
#   - docs           : Docusaurus Documentation      (port 3002)
#   - postgres       : TimescaleDB for events        (port 5432)
#   - redis          : Queue & caching               (port 6379)
#   - ollama-proxy   : Transparent telemetry proxy   (port 11434, 11435)
#   - ollama / cpu   : Local LLM runtime             (internal only)
#   - scout          : Connector agent               (profile: scout)
# ──────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  networks:
    - hive

services:
  # ── TimescaleDB — event storage ──────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    <<: *common
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hive
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive_dev_password}
      # PGDATA in a subdirectory so .gitkeep in the mount root doesn't block initdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./.hive/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis — queue & caching ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *common
    ports:
      - "6379:6379"
    volumes:
      - ./.hive/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Node Server — TTP ingestion ──────────────────────────────────────────
  node-server:
    build:
      context: .
      dockerfile: Dockerfile.node
    <<: *common
    ports:
      - "3000:3000"
    environment:
      # ── App config (from .env.docker) ──
      NODE_PORT: "3000"
      NODE_REGION: ${NODE_REGION:-AE}
      NODE_ID: ${NODE_ID:-hive-node-01}
      NODE_INGEST_TOKEN: ${NODE_INGEST_TOKEN:-hive-dev-token-2026}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # ── Docker-internal URLs (not in .env — these are fixed network names) ──
      NODE_DATABASE_URL: postgresql://hive:${POSTGRES_PASSWORD:-hive_dev_password}@postgres:5432/hive
      NODE_REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Dashboard — Next.js HIVE UI ──────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    <<: *common
    ports:
      - "3001:3001"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
      # SSR fetches use Docker network name
      DASHBOARD_NODE_URL: http://node-server:3000
      # Client-side (browser) fetches use host-mapped port
      NEXT_PUBLIC_NODE_URL: http://localhost:3000
    depends_on:
      node-server:
        condition: service_healthy

  # ── Ollama — Local LLM (GPU) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    <<: *common
    networks:
      hive:
        aliases:
          - ollama-internal
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    profiles:
      - gpu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama CPU-only (default) ────────────────────────────────────────────
  ollama-cpu:
    image: ollama/ollama:latest
    <<: *common
    networks:
      hive:
        aliases:
          - ollama-internal
    volumes:
      - ollama-models:/root/.ollama
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    profiles:
      - cpu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama Model Puller — auto-pulls default model on first run ─────────
  # Runs once, pulls llama3.2:3b into the shared volume, then exits.
  # Subsequent starts skip if model already exists.
  ollama-pull:
    image: ollama/ollama:latest
    <<: *common
    restart: "no"
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting Ollama server for model pull..."
        ollama serve &
        SERVER_PID=$$!
        # Wait for server to be ready
        for i in $$(seq 1 30); do
          wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1 && break
          sleep 1
        done
        MODEL="${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}"
        echo "Checking model: $$MODEL"
        if ollama list | grep -q "$${MODEL%%:*}"; then
          echo "Model $$MODEL already present — skipping pull."
        else
          echo "Pulling $$MODEL ..."
          ollama pull "$$MODEL"
          echo "Pull complete."
        fi
        kill $$SERVER_PID 2>/dev/null
    profiles:
      - cpu
      - gpu

  # ── Ollama Proxy — transparent reverse proxy capturing TTP telemetry ──────
  # Sits between all clients and Ollama. Maps host:11434 → proxy → Ollama.
  # This means `ollama chat`, `curl localhost:11434`, and dashboard chat are all captured.
  ollama-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    <<: *common
    ports:
      - "11434:11435"
      - "11435:11435"
    environment:
      OLLAMA_PROXY_PORT: "11435"
      OLLAMA_TARGET: "http://ollama-internal:11434"
      NODE_URL: "http://node-server:3000"
      NODE_INGEST_TOKEN: ${NODE_INGEST_TOKEN:-hive-dev-token-2026}
      HIVE_DEPT_TAG: ${HIVE_DEPT_TAG:-}
      HIVE_PROJECT_TAG: ${HIVE_PROJECT_TAG:-}
    depends_on:
      node-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11435/ || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Documentation — Docusaurus site ──────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    <<: *common
    ports:
      - "3002:3002"
    profiles:
      - docs

  # ── Scout Agent — connector container for remote monitoring ──────────────
  # Runs Scout with fetch-level connectors. Point HIVE_OLLAMA_HOST to the
  # proxy and it auto-captures all traffic from any Node.js app in this container.
  # Operators can use this as a sidecar for their AI workloads.
  scout:
    build:
      context: .
      dockerfile: Dockerfile.scout
    <<: *common
    environment:
      HIVE_DEPLOYMENT: node
      TTP_ENDPOINT: http://node-server:3000/api/v1/ttp/ingest
      TTP_TOKEN: ${NODE_INGEST_TOKEN:-hive-dev-token-2026}
      HIVE_CONNECTORS: ${HIVE_CONNECTORS:-ollama,openai,anthropic}
      HIVE_OLLAMA_HOST: ollama-internal:11434
      HIVE_DATA_RESIDENCY: ${HIVE_DATA_RESIDENCY:-AE}
      HIVE_RETENTION_DAYS: ${HIVE_RETENTION_DAYS:-90}
      HIVE_REGULATION_TAGS: ${HIVE_REGULATION_TAGS:-}
      HIVE_FLUSH_INTERVAL_MS: ${HIVE_FLUSH_INTERVAL_MS:-60000}
    depends_on:
      node-server:
        condition: service_healthy
    profiles:
      - scout

# Persistent data: postgres & redis on disk at .hive/data/, Ollama models in a Docker volume.
# Named volume survives `docker compose down`. Use `docker volume rm hiveHQ_ollama-models` to purge.

volumes:
  ollama-models:
    name: hive-ollama-models

networks:
  hive:
    driver: bridge
