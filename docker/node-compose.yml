version: '3.9'

# HIVE Node Hub — full on-prem stack.
#   docker-compose -f docker/node-compose.yml up -d
#   Dashboard: http://localhost:${DASHBOARD_PORT:-3001}
#   Node API:  http://localhost:${NODE_PORT:-3000}

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hive_node
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hive-dev-password}
    volumes:
      - hive-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hive -d hive_node']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hive-redis
    restart: unless-stopped
    volumes:
      - hive-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  node-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node-server
    container_name: hive-node-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_PORT: 3000
      NODE_DATABASE_URL: postgres://hive:${POSTGRES_PASSWORD:-hive-dev-password}@postgres:5432/hive_node
      NODE_REDIS_URL: redis://redis:6379
      NODE_REGION: ${NODE_REGION:-AE}
      NODE_ID: ${NODE_ID:-}
      NODE_INGEST_TOKEN: ${NODE_INGEST_TOKEN:-}
    ports:
      - '${NODE_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: hive-dashboard
    restart: unless-stopped
    depends_on:
      node-server:
        condition: service_healthy
    environment:
      DASHBOARD_PORT: 3001
      DASHBOARD_NODE_URL: http://node-server:3000
    ports:
      - '${DASHBOARD_PORT:-3001}:3001'

volumes:
  hive-postgres-data:
  hive-redis-data:
